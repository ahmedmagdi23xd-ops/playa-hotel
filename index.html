<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playa Luxury Hotel — نظام التشغيل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* PLAYA palette — clean white & ocean blue */
  --sand:#f5f8fb;
  --sand-deep:#e7eef5;
  --ink:#1c2b36;
  --lagoon:#1a5fb4;
  --lagoon-deep:#0d3a73;
  --lagoon-light:#4f96e0;
  --coral:#2878c8;
  --coral-deep:#1c5fa8;
  --gold:#1a5fb4;
  --line:#d7e2ee;

  --status-available:#3f8a5b;
  --status-available-bg:#e3f2e7;
  --status-occupied:#2d6e8e;
  --status-occupied-bg:#e1eef5;
  --status-reserved:#c9842f;
  --status-reserved-bg:#fbedda;
  --status-dirty:#c7a319;
  --status-dirty-bg:#fbf3d6;
  --status-oos:#bf4040;
  --status-oos-bg:#fbe3e3;
  --status-maint:#6b6b6b;
  --status-maint-bg:#e9e9e7;

  --radius:14px;
  --shadow:0 2px 10px rgba(26,95,180,0.08);
  --shadow-lg:0 8px 30px rgba(26,95,180,0.14);
}

[data-theme="dark"]{
  --sand:#0e1824;
  --sand-deep:#16222f;
  --ink:#e8eef5;
  --lagoon:#6fa8e8;
  --lagoon-deep:#091420;
  --lagoon-light:#3c6064;
  --coral:#5a9fe8;
  --coral-deep:#4a8fd8;
  --gold:#6fa8e8;
  --line:#28384a;

  --status-available-bg:#1e3326;
  --status-occupied-bg:#1c2f3a;
  --status-reserved-bg:#3a2c14;
  --status-dirty-bg:#3a3414;
  --status-oos-bg:#3a1e1e;
  --status-maint-bg:#2c2c2a;

  --shadow:0 2px 10px rgba(0,0,0,0.3);
  --shadow-lg:0 8px 30px rgba(0,0,0,0.45);
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:'Cairo','Tajawal',sans-serif;
  background:var(--sand);
  color:var(--ink);
  transition:background .3s, color .3s;
  -webkit-font-smoothing:antialiased;
}
.serif{font-family:'Cormorant Garamond', serif;}

#app{display:flex; min-height:100vh;}

/* ============ SIDEBAR ============ */
.sidebar{
  width:240px;
  background:var(--lagoon-deep);
  color:#f3ead9;
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  position:sticky;
  top:0;
  height:100vh;
  z-index:50;
  transition:transform .25s ease;
}
.sidebar-brand{
  padding:26px 22px 18px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.sidebar-brand .logo-mark{
  font-family:'Cormorant Garamond', serif;
  font-size:28px;
  font-weight:700;
  letter-spacing:2px;
  color:var(--gold);
}
.sidebar-brand .logo-sub{
  font-size:11px;
  letter-spacing:3px;
  opacity:.65;
  margin-top:4px;
  text-transform:uppercase;
}
.sidebar-nav{flex:1; overflow-y:auto; padding:14px 12px;}
.nav-item{
  display:flex; align-items:center; gap:12px;
  padding:12px 14px;
  border-radius:10px;
  color:#cfe3e1;
  cursor:pointer;
  font-size:14.5px;
  font-weight:500;
  margin-bottom:2px;
  transition:background .15s, color .15s;
  user-select:none;
}
.nav-item .icon{font-size:18px; width:22px; text-align:center; flex-shrink:0;}
.nav-item:hover{background:rgba(255,255,255,0.06); color:#fff;}
.nav-item.active{
  background:var(--coral);
  color:#fff;
  box-shadow:0 4px 14px rgba(217,120,79,0.35);
}
.nav-section-label{
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  opacity:.45; padding:16px 14px 6px; font-weight:600;
}
.sidebar-footer{
  padding:14px 18px 18px;
  border-top:1px solid rgba(255,255,255,0.08);
  font-size:12.5px;
}
.user-chip{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.user-avatar{
  width:34px; height:34px; border-radius:50%;
  background:var(--coral);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:14px; flex-shrink:0;
}
.user-meta .name{font-weight:600; font-size:13.5px;}
.user-meta .role{opacity:.6; font-size:11px;}
.logout-btn{
  width:100%; padding:8px; border-radius:8px;
  background:rgba(255,255,255,0.07); color:#f3ead9; border:none;
  font-size:12.5px; cursor:pointer; font-family:inherit; font-weight:500;
}
.logout-btn:hover{background:rgba(255,255,255,0.13);}

/* mobile sidebar */
.sidebar-overlay{display:none;}
@media (max-width:900px){
  .sidebar{position:fixed; transform:translateX(-105%); height:100vh; box-shadow:var(--shadow-lg);}
  html[dir="rtl"] .sidebar{transform:translateX(105%);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:45;
  }
  .sidebar-overlay.show{display:block;}
}

/* ============ MAIN ============ */
.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  position:sticky; top:0; z-index:30;
  background:var(--sand);
  border-bottom:1px solid var(--line);
  padding:14px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:14px;
  backdrop-filter:blur(6px);
}
.topbar-title{display:flex; align-items:center; gap:12px;}
.topbar-title h1{font-size:20px; font-weight:700;}
.menu-toggle{
  display:none; background:none; border:none; font-size:22px; cursor:pointer; color:var(--ink);
}
@media (max-width:900px){ .menu-toggle{display:block;} }
.topbar-actions{display:flex; align-items:center; gap:10px;}
.icon-btn{
  width:38px; height:38px; border-radius:10px; border:1px solid var(--line);
  background:var(--sand); display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:17px; color:var(--ink); transition:.15s;
}
.icon-btn:hover{background:var(--sand-deep);}
.lang-toggle{font-size:13px; font-weight:700; width:auto; padding:0 12px;}

.content{padding:20px 24px 60px; flex:1;}

/* ============ LOGIN ============ */
.login-wrap{
  min-height:100vh; width:100%; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(160deg, var(--lagoon-deep) 0%, var(--lagoon) 100%);
  padding:20px; gap:40px; flex-wrap:wrap;
}
.login-logo-panel{
  display:flex; align-items:center; justify-content:center;
  flex:0 0 auto;
}
.login-logo-img{
  width:260px; max-width:60vw; height:auto;
  filter:drop-shadow(0 10px 30px rgba(0,0,0,0.25));
}
@media(max-width:760px){
  .login-logo-panel{ order:-1; }
  .login-logo-img{ width:140px; }
}
.login-card{
  background:var(--sand); border-radius:20px; padding:42px 36px;
  width:100%; max-width:380px; box-shadow:var(--shadow-lg);
  text-align:center; flex:0 0 auto;
}
.login-card .logo-mark{
  font-family:'Cormorant Garamond', serif; font-size:36px; font-weight:700;
  color:var(--lagoon); letter-spacing:3px;
}
.login-card .logo-sub{
  font-size:11px; letter-spacing:4px; text-transform:uppercase; opacity:.55; margin:6px 0 30px;
}
.login-users{display:flex; flex-direction:column; gap:10px;}
.login-user-btn{
  display:flex; align-items:center; gap:14px;
  padding:14px 16px; border-radius:12px; border:1px solid var(--line);
  background:#fff; cursor:pointer; text-align:right; font-family:inherit;
  transition:.15s;
}
[data-theme="dark"] .login-user-btn{background:var(--sand-deep);}
.login-user-btn:hover{border-color:var(--coral); transform:translateY(-1px); box-shadow:var(--shadow);}
.login-user-btn .user-avatar{width:42px; height:42px; font-size:16px;}
.login-user-btn .name{font-weight:700; font-size:15px;}
.login-user-btn .role{font-size:12px; opacity:.6; margin-top:2px;}

/* ============ CARDS / GRID ============ */
.card{
  background:#fff; border-radius:var(--radius); padding:18px;
  box-shadow:var(--shadow); border:1px solid var(--line);
}
[data-theme="dark"] .card{background:var(--sand-deep);}
.section-title{
  font-size:17px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.section-title .eyebrow{
  font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--coral); font-weight:700;
}

/* Dashboard stat grid */
.stat-grid{
  display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:12px; margin-bottom:22px;
}
.stat-card{
  background:#fff; border-radius:var(--radius); padding:16px 18px;
  border:1px solid var(--line); box-shadow:var(--shadow);
  position:relative; overflow:hidden;
}
[data-theme="dark"] .stat-card{background:var(--sand-deep);}
.stat-card .stat-val{font-size:30px; font-weight:800; font-family:'Cormorant Garamond',serif; line-height:1;}
.stat-card .stat-label{font-size:12.5px; opacity:.7; margin-top:6px; font-weight:500;}
.stat-card .stat-bar{height:4px; border-radius:2px; margin-top:10px; background:var(--line); overflow:hidden;}
.stat-card .stat-bar > div{height:100%; border-radius:2px;}

/* Room board */
.floor-block{margin-bottom:26px;}
.floor-title{
  font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:var(--lagoon); margin-bottom:10px; padding-bottom:8px; border-bottom:2px solid var(--line);
  display:flex; align-items:center; gap:8px;
}
[data-theme="dark"] .floor-title{color:var(--lagoon);}
.room-grid{
  display:grid; grid-template-columns:repeat(auto-fill, minmax(130px,1fr)); gap:10px;
}
.room-card{
  border-radius:12px; padding:12px; cursor:pointer; transition:.15s;
  border:1px solid var(--line); position:relative; min-height:104px;
  display:flex; flex-direction:column; justify-content:space-between;
}
.room-card:hover{transform:translateY(-2px); box-shadow:var(--shadow-lg);}
.room-card .room-num{font-size:20px; font-weight:800; font-family:'Cormorant Garamond',serif;}
.room-card .room-guest{font-size:12px; font-weight:600; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.room-card .room-meta{font-size:10.5px; opacity:.75; margin-top:2px;}
.room-card .room-badge{
  position:absolute; top:8px; left:8px; font-size:9.5px; font-weight:700;
  padding:2px 7px; border-radius:6px; letter-spacing:.5px;
}
.room-card.status-available{background:var(--status-available-bg); border-color:var(--status-available);}
.room-card.status-occupied{background:var(--status-occupied-bg); border-color:var(--status-occupied);}
.room-card.status-reserved{background:var(--status-reserved-bg); border-color:var(--status-reserved);}
.room-card.status-dirty{background:var(--status-dirty-bg); border-color:var(--status-dirty);}
.room-card.status-oos{background:var(--status-oos-bg); border-color:var(--status-oos);}
.room-card.status-maintenance{background:var(--status-maint-bg); border-color:var(--status-maint);}

.status-available .room-badge{background:var(--status-available); color:#fff;}
.status-occupied .room-badge{background:var(--status-occupied); color:#fff;}
.status-reserved .room-badge{background:var(--status-reserved); color:#fff;}
.status-dirty .room-badge{background:var(--status-dirty); color:#fff;}
.status-oos .room-badge{background:var(--status-oos); color:#fff;}
.status-maintenance .room-badge{background:var(--status-maint); color:#fff;}

/* legend */
.legend{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px; font-size:12.5px;}
.legend-item{display:flex; align-items:center; gap:6px;}
.legend-dot{width:12px; height:12px; border-radius:4px;}

/* Buttons */
.btn{
  display:inline-flex; align-items:center; gap:8px; justify-content:center;
  padding:10px 18px; border-radius:10px; border:none; cursor:pointer;
  font-family:inherit; font-weight:700; font-size:14px; transition:.15s;
}
.btn-primary{background:var(--coral); color:#fff;}
.btn-primary:hover{background:var(--coral-deep);}
.btn-secondary{background:var(--lagoon); color:#fff;}
.btn-secondary:hover{background:var(--lagoon-deep);}
.btn-outline{background:transparent; border:1px solid var(--line); color:var(--ink);}
.btn-outline:hover{background:var(--sand-deep);}
.btn-ghost{background:transparent; border:none; color:var(--lagoon); padding:6px 10px;}
.btn-sm{padding:7px 12px; font-size:12.5px;}
.btn-danger{background:var(--status-oos); color:#fff;}
.btn-block{width:100%;}
.btn:disabled{opacity:.5; cursor:not-allowed;}

/* forms */
.form-group{margin-bottom:14px;}
.form-group label{display:block; font-size:13px; font-weight:700; margin-bottom:6px;}
.form-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
@media(max-width:560px){.form-row{grid-template-columns:1fr;}}
input, select, textarea{
  width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line);
  background:#fff; color:var(--ink); font-family:inherit; font-size:14px;
}
[data-theme="dark"] input, [data-theme="dark"] select, [data-theme="dark"] textarea{background:var(--lagoon-deep); border-color:var(--line);}
textarea{resize:vertical; min-height:70px;}
input[type="file"]{padding:8px;}
.checkbox-row{display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600;}
.checkbox-row input{width:auto;}

/* modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(18,30,30,.55); z-index:200;
  display:flex; align-items:flex-end; justify-content:center;
  backdrop-filter:blur(2px);
}
@media(min-width:700px){.modal-overlay{align-items:center;}}
.modal{
  background:var(--sand); border-radius:18px 18px 0 0; width:100%; max-width:560px;
  max-height:92vh; overflow-y:auto; padding:22px; box-shadow:var(--shadow-lg);
  animation:modalUp .25s ease;
}
@media(min-width:700px){.modal{border-radius:18px;}}
@keyframes modalUp{from{transform:translateY(40px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
.modal-header h2{font-size:18px; font-weight:800;}
.modal-close{background:none; border:none; font-size:22px; cursor:pointer; color:var(--ink); line-height:1;}
.modal-actions{display:flex; gap:10px; margin-top:18px;}

/* badges/pills */
.pill{display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:700;}
.pill-available{background:var(--status-available-bg); color:var(--status-available);}
.pill-occupied{background:var(--status-occupied-bg); color:var(--status-occupied);}
.pill-reserved{background:var(--status-reserved-bg); color:var(--status-reserved);}
.pill-dirty{background:var(--status-dirty-bg); color:var(--status-dirty);}
.pill-oos{background:var(--status-oos-bg); color:var(--status-oos);}
.pill-maintenance{background:var(--status-maint-bg); color:var(--status-maint);}
.pill-open{background:var(--status-reserved-bg); color:var(--status-reserved);}
.pill-inprogress{background:var(--status-occupied-bg); color:var(--status-occupied);}
.pill-completed{background:var(--status-available-bg); color:var(--status-available);}

/* table */
.table-wrap{overflow-x:auto;}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th, td{padding:10px 12px; text-align:right; border-bottom:1px solid var(--line); white-space:nowrap;}
th{font-weight:700; color:var(--lagoon); font-size:12.5px; text-transform:uppercase; letter-spacing:.5px;}
[data-theme="dark"] th{color:var(--lagoon);}
tbody tr:hover{background:var(--sand-deep);}

/* tabs */
.tabs{display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; padding-bottom:2px;}
.tab{
  padding:9px 16px; border-radius:10px; background:transparent; border:1px solid var(--line);
  cursor:pointer; font-family:inherit; font-weight:700; font-size:13px; white-space:nowrap; color:var(--ink);
}
.tab.active{background:var(--lagoon); color:#fff; border-color:var(--lagoon);}

/* empty state */
.empty-state{text-align:center; padding:40px 20px; opacity:.6;}
.empty-state .icon{font-size:40px; margin-bottom:10px;}

/* activity log */
.log-item{
  display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); font-size:13px;
}
.log-item:last-child{border-bottom:none;}
.log-time{opacity:.55; font-size:11.5px; white-space:nowrap;}
.log-icon{font-size:16px;}

/* calendar */
.cal-wrap{overflow-x:auto;}
.cal-grid{display:grid; min-width:fit-content;}
.cal-row{display:grid; grid-template-columns:90px; align-items:stretch;}
.cal-cell{
  min-width:46px; height:38px; display:flex; align-items:center; justify-content:center;
  font-size:11px; border:1px solid var(--line); font-weight:600;
}
.cal-room-label{
  min-width:90px; position:sticky; right:0; background:var(--sand); z-index:5;
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12.5px;
  border:1px solid var(--line);
}
[data-theme="dark"] .cal-room-label{background:var(--sand-deep);}
.cal-header-cell{
  min-width:46px; height:46px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:10.5px; font-weight:700; border:1px solid var(--line); background:var(--sand-deep);
}

/* image preview thumbs */
.photo-thumb{
  width:100%; max-height:140px; object-fit:cover; border-radius:10px; margin-top:6px; border:1px solid var(--line);
}
.photo-row{display:flex; gap:10px; flex-wrap:wrap;}
.photo-row > div{flex:1; min-width:120px;}

/* toast */
.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--lagoon-deep); color:#fff; padding:12px 22px; border-radius:30px;
  font-size:13.5px; font-weight:600; box-shadow:var(--shadow-lg); z-index:300;
  animation:toastIn .25s ease;
}
@keyframes toastIn{from{opacity:0; transform:translate(-50%,10px);} to{opacity:1; transform:translate(-50%,0);}}

/* progress ring for occupancy */
.occ-ring-wrap{display:flex; align-items:center; gap:20px;}
.occ-ring{position:relative; width:96px; height:96px; flex-shrink:0;}
.occ-ring svg{transform:rotate(-90deg);}
.occ-ring .occ-val{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:800;
}

/* utilities */
.flex{display:flex;}
.flex-between{display:flex; justify-content:space-between; align-items:center;}
.gap-8{gap:8px;} .gap-12{gap:12px;} .mb-12{margin-bottom:12px;} .mb-18{margin-bottom:18px;}
.text-muted{opacity:.65; font-size:13px;}
.text-sm{font-size:12.5px;}
.text-center{text-align:center;}
.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media(max-width:700px){.grid-2{grid-template-columns:1fr;}}
.scroll-x{overflow-x:auto;}
hr.divider{border:none; border-top:1px solid var(--line); margin:16px 0;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ============================================================

/* ---------------- SUPABASE (cloud sync) ---------------- */
const SUPABASE_URL = 'https://caxzckmhiogmmzwazhmt.supabase.co';

const ROOM_LAYOUT = [

  { floor:'الدور الأول', floorEn:'First Floor', section:'سايد سي فيو', sectionEn:'Side Sea View', rooms:['201','202','203','204','205','206','207','208','209','210','211','212'] },
  { floor:'الدور الأول', floorEn:'First Floor', section:'باك فيو', sectionEn:'Back View', rooms:['213','214','215','216','217','218','219','220','221'] },

function defaultState(){
  const rooms = {};
  ROOM_LAYOUT.forEach(block=>{
    block.rooms.forEach(num=>{
      rooms[num] = {
        number:num,
        floor:block.floor, floorEn:block.floorEn,
        section:block.section, sectionEn:block.sectionEn,
        status:'available',
        guest:null, // {name, count, arrival, departure, breakfast, source, notes}
        history:[], // [{type, text, textEn, ts}]
      };
    });
  });
  return {
    rooms,
    reservations: [], // future reservations not yet checked in
    maintenance: [],
    expenses: [],
    activityLog: [],
    employees: [], // {id, name, baseSalary, advances:[{date,amount,note}], details:[{date,amount,note}], deductions:[{date,amount,note}], notes, active, endOfService:{date,note,settlementAmount}}
    userPasswords: { ahmed:'2311', islam:'1212', tarek:'2909', adel:'1111' },
    settings:{ lang:'ar', theme:'light' }
  };
}

function normalizeState(parsed){
  const def = defaultState();
  if(!parsed) return def;
  Object.keys(def.rooms).forEach(num=>{
    if(!parsed.rooms || !parsed.rooms[num]) {
      if(!parsed.rooms) parsed.rooms = {};
      parsed.rooms[num] = def.rooms[num];
    }
  });
  if(!parsed.settings) parsed.settings = {lang:'ar', theme:'light'};
  if(!parsed.reservations) parsed.reservations=[];
  if(!parsed.maintenance) parsed.maintenance=[];
  if(!parsed.expenses) parsed.expenses=[];
  if(!parsed.activityLog) parsed.activityLog=[];
  if(!parsed.employees) parsed.employees=[];
  parsed.employees.forEach(emp=>{
    if(!emp.details) emp.details=[];
    if(!emp.advances) emp.advances=[];
    if(!emp.deductions) emp.deductions=[];
    if(emp.active===undefined) emp.active=true;
    if(!emp.baseSalary) emp.baseSalary = emp.baseSalary||0;
  });
  if(!parsed.userPasswords) parsed.userPasswords = {...def.userPasswords};
  USERS.forEach(u=>{ if(!(u.id in parsed.userPasswords)) parsed.userPasswords[u.id] = u.password; });
  return parsed;
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return normalizeState(parsed);
  }catch(e){ return defaultState(); }
}

let saveDebounceTimer = null;

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if(cloudSyncEnabled && !isSyncing){
    clearTimeout(saveDebounceTimer);
    saveDebounceTimer = setTimeout(pushStateToCloud, 400);
  }
}

async function pushStateToCloud(){
  if(!supabaseClient) return;
  try{
    await supabaseClient
      .from('hotel_state')
      .update({ data: state, updated_at: new Date().toISOString() })
      .eq('id', 1);
  }catch(e){ console.warn('Cloud sync push failed', e); }
}

async function pullStateFromCloud(){
  if(!supabaseClient) return null;
  try{
    const { data, error } = await supabaseClient
      .from('hotel_state')
      .select('data')
      .eq('id', 1)
      .single();
    if(error) throw error;
    if(data && data.data) return data.data;
    return null;
  }catch(e){ console.warn('Cloud sync pull failed', e); return null; }
}

function subscribeToCloud(){
  if(!supabaseClient) return;
  supabaseChannel = supabaseClient
    .channel('hotel_state_changes')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'hotel_state', filter:'id=eq.1' }, (payload)=>{
      if(!payload.new || !payload.new.data) return;
      isSyncing = true;
      try{
        state = normalizeState(payload.new.data);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        // preserve local-only navigation state, just re-render
        render();
      } finally {
        isSyncing = false;
      }
    })
    .subscribe();
}

async function initCloudSync(){
  if(!supabaseClient) return;
  const cloudData = await pullStateFromCloud();
  if(cloudData && Object.keys(cloudData).length>0){
    isSyncing = true;
    state = normalizeState(cloudData);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    isSyncing = false;
    render();
  } else {
    // seed cloud with current local state
    pushStateToCloud();
  }
  subscribeToCloud();
}

function persistSettings(){
  state.settings.lang = lang;
  state.settings.theme = theme;
  saveState();
}


/* ---------------- HELPERS ---------------- */
function t(ar, en){ return lang==='ar' ? ar : en; }

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function fmtDate(d){
  if(!d) return '—';
  const date = new Date(d);
  if(isNaN(date)) return d;
  return date.toLocaleDateString(lang==='ar'?'ar-EG':'en-GB', {day:'2-digit', month:'2-digit', year:'numeric'});
}

function fmtDateTime(ts){
  const d = new Date(ts);
  return d.toLocaleString(lang==='ar'?'ar-EG':'en-GB', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function todayStr(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function addDays(dateStr, n){
  const d = new Date(dateStr);
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

function logActivity(text, textEn, icon='📝'){
  state.activityLog.unshift({
    id:uid(), ts:Date.now(), text, textEn, icon,
    user: currentUser ? (lang==='ar'? currentUser.name : currentUser.nameEn) : '—',
    userName: currentUser ? currentUser.name : '—',
    userNameEn: currentUser ? currentUser.nameEn : '—',
  });
  if(state.activityLog.length>300) state.activityLog.length=300;
}

function roomHistoryPush(roomNum, entry){
  state.rooms[roomNum].history.unshift({ id:uid(), ts:Date.now(), ...entry });
}

function showToast(msg){
  const el = document.createElement('div');
  el.className='toast';
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2400);
}

function fileToDataUrl(file){
  return new Promise((res)=>{
    const reader = new FileReader();
    reader.onload = ()=>res(reader.result);
    reader.readAsDataURL(file);
  });
}

function getRoomCounts(){
  const counts = { available:0, occupied:0, reserved:0, dirty:0, oos:0, maintenance:0 };
  Object.values(state.rooms).forEach(r=>{ counts[r.status]++; });
  return counts;
}

function getOpenMaintenanceCount(){
  return state.maintenance.filter(m=>m.status!=='completed').length;
}

function getTodayExpensesTotal(){
  const today = todayStr();
  return state.expenses.filter(e=>e.date===today).reduce((s,e)=>s+Number(e.amount||0),0);
}

function getBreakfastForecast(forDate){
  // Count occupied rooms with breakfast included that won't have departed by `forDate`,
  // plus reservations arriving on/before forDate and departing after forDate with breakfast.
  let count=0;
  Object.values(state.rooms).forEach(r=>{
    if(r.status==='occupied' && r.guest && r.guest.breakfast){
      if(!r.guest.departure || r.guest.departure > forDate){
        count += Number(r.guest.count||1);
      }
    }
  });
  state.reservations.forEach(res=>{
    if(res.breakfast && res.arrival <= forDate && res.departure > forDate){
      count += Number(res.guestCount||1);
    }
  });
  return count;
}

/* ============================================================
   AVAILABILITY CALENDAR
   ============================================================ */
function renderCalendar(){
  const days = [];
  for(let i=0;i<calRange;i++) days.push(addDays(todayStr(), i));

  const allRooms = Object.values(state.rooms);

  // build occupancy map per room per date
  function roomStatusOnDate(room, dateStr){
    // currently occupied & dates overlap
    if(room.status==='occupied' && room.guest){
      if(room.guest.arrival<=dateStr && dateStr<room.guest.departure) return 'occ';
    }
    // future reservations
    const res = state.reservations.find(r=> (r.roomNumbers||[]).includes(room.number) && r.arrival<=dateStr && dateStr<r.departure);
    if(res) return 'res';
    if(room.status==='oos' || room.status==='maintenance') return 'oos';
    return 'free';
  }

  const colorMap = {
    occ: 'var(--status-occupied)',
    res: 'var(--status-reserved)',
    oos: 'var(--status-maint)',
    free: 'var(--status-available-bg)'
  };

  return `
    <div class="flex gap-8 mb-18">
      <button class="tab ${calRange===7?'active':''}" data-range="7">7 ${t('أيام','Days')}</button>
      <button class="tab ${calRange===14?'active':''}" data-range="14">14 ${t('أيام','Days')}</button>
      <button class="tab ${calRange===30?'active':''}" data-range="30">30 ${t('يوم','Days')}</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--status-available-bg); border:1px solid var(--line);"></div><span>${t('متاحة','Available')}</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--status-occupied);"></div><span>${t('مشغولة','Occupied')}</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--status-reserved);"></div><span>${t('محجوزة','Reserved')}</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--status-maint);"></div><span>${t('غير متاحة','Unavailable')}</span></div>
    </div>
    <div class="card cal-wrap">
      <div class="cal-grid" style="grid-template-columns: 90px repeat(${days.length}, 46px);">
        <div class="cal-room-label" style="position:sticky;">${t('الغرفة','Room')}</div>
        ${days.map(d=>{
          const date = new Date(d);
          return `<div class="cal-header-cell"><span>${date.toLocaleDateString(lang==='ar'?'ar-EG':'en-GB',{weekday:'short'})}</span><span>${date.getDate()}/${date.getMonth()+1}</span></div>`;
        }).join('')}

        ${allRooms.map(room=>`
          <div class="cal-room-label">${room.number}</div>
          ${days.map(d=>{
            const s = roomStatusOnDate(room,d);
            return `<div class="cal-cell" style="background:${colorMap[s]}; color:${s==='free'?'var(--ink)':'#fff'};" title="${room.number} · ${fmtDate(d)}"></div>`;
          }).join('')}
        `).join('')}
      </div>
    </div>
  `;
}

  document.querySelectorAll('[data-range]').forEach(btn=>{
    btn.onclick = ()=>{ calRange = Number(btn.dataset.range); render(); };
  });
}

let employeeDetailId = null;

function employeeMonthTotals(emp, monthStr){
  // monthStr = 'YYYY-MM'
  const details = (emp.details||[]).filter(d=>d.date.slice(0,7)===monthStr);
  const advances = (emp.advances||[]).filter(a=>a.date.slice(0,7)===monthStr);
  const deductions = (emp.deductions||[]).filter(x=>x.date.slice(0,7)===monthStr);
  const detailsTotal = details.reduce((s,d)=>s+Number(d.amount||0),0);
  const advancesTotal = advances.reduce((s,a)=>s+Number(a.amount||0),0);
  const deductionsTotal = deductions.reduce((s,x)=>s+Number(x.amount||0),0);
  const netPay = Number(emp.baseSalary||0) - advancesTotal - deductionsTotal + detailsTotal;
  return { details, advances, deductions, detailsTotal, advancesTotal, deductionsTotal, netPay };
}

function bindSettings(){
  document.querySelectorAll('[data-savepw]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.savepw;
      const val = document.getElementById('pw_'+id).value.trim();
      if(!val){ showToast(t('من فضلك أدخل كلمة مرور','Please enter a password')); return; }
      state.userPasswords[id] = val;
      const u = USERS.find(x=>x.id===id);
      logActivity(`${currentUser.name} غيّر كلمة مرور ${u.name}`, `${currentUser.nameEn} changed password for ${u.nameEn}`, '🔐');
      saveState(); showToast(t('تم الحفظ','Saved'));
    };
  });

  const resetBtn = document.getElementById('resetSystemBtn');
  if(resetBtn) resetBtn.onclick = ()=>{
    if(!confirm(t('هل أنت متأكد؟ سيتم حذف كل البيانات نهائياً ولا يمكن التراجع.','Are you sure? All data will be permanently deleted and cannot be undone.'))) return;
    if(!confirm(t('تأكيد أخير: هل تريد بالفعل تصفير النظام بالكامل؟','Final confirmation: do you really want to reset the entire system?'))) return;

    const preservedPasswords = {...state.userPasswords};
    const def = defaultState();
    def.userPasswords = preservedPasswords;
    def.settings = {...state.settings};
    state = def;
    saveState();
    logActivity(`${currentUser.name} قام بتصفير النظام بالكامل`, `${currentUser.nameEn} reset the entire system`, '🗑️');
    saveState();
    showToast(t('تم تصفير النظام','System reset complete'));
    currentView='dashboard';
    render();
  };
}

function bindModal(){
  const overlay = document.getElementById('modalOverlay');
  const closeBtn = document.getElementById('modalClose');
  const close = ()=>{ activeModal=null; render(); };
  if(overlay) overlay.onclick = (e)=>{ if(e.target===overlay) close(); };
  if(closeBtn) closeBtn.onclick = close;

  switch(activeModal.type){
    case 'checkin': return bindCheckIn(close);
    case 'editreservation': return bindEditReservation(close);
    case 'checkout': return bindCheckOut(close);
    case 'roomchange': return bindRoomChange(close);
    case 'newreservation': return bindNewReservation(close);
    case 'newgroupreservation': return bindNewGroupReservation(close);
    case 'checkinFromReservation': return bindCheckInFromReservation(close);
    case 'newticket': return bindNewTicket(close);
    case 'completeticket': return bindCompleteTicket(close);
    case 'newexpense': return bindNewExpense(close);
    case 'newemployee': return bindNewEmployee(close);

function bindNewTicket(close){
  document.getElementById('modalCancel').onclick = close;
  document.getElementById('modalSubmit').onclick = async ()=>{
    const problem = document.getElementById('mt_problem').value.trim();
    if(!problem){ showToast(t('من فضلك أدخل وصف المشكلة','Please enter the problem')); return; }
    const roomNum = document.getElementById('mt_room').value;
    const fileInput = document.getElementById('mt_before');
    let beforePhoto=null;
    if(fileInput.files[0]) beforePhoto = await fileToDataUrl(fileInput.files[0]);

    const ticket = {
      id: uid(), ts: Date.now(),
      room: roomNum,
      problem,
      priority: document.getElementById('mt_priority').value,
      assignedTo: document.getElementById('mt_assigned').value.trim(),
      status:'open',
      beforePhoto, afterPhoto:null,
    };
    state.maintenance.push(ticket);

    // set room to maintenance status if currently available
    if(state.rooms[roomNum].status==='available'){
      state.rooms[roomNum].status='maintenance';
    }
    roomHistoryPush(roomNum, {type:'maintenance', text:`فتح تذكرة صيانة: ${problem}`, textEn:`Maintenance ticket opened: ${problem}`, icon:'🛠️'});
    logActivity(`${currentUser.name} فتح تذكرة صيانة لغرفة ${roomNum}`, `${currentUser.nameEn} opened a maintenance ticket for room ${roomNum}`, '🛠️');
    saveState(); showToast(t('تم فتح التذكرة','Ticket created')); close();
  };
}

function modalCompleteTicket(){

    t('إنهاء تذكرة الصيانة','Complete Maintenance Ticket'),
    `

      <label>${t('صورة بعد الإصلاح (اختياري)','After Photo (optional)')}</label>
      <input type="file" id="ct_after" accept="image/*">
    </div>
    `,
    `<div class="modal-actions">
      <button class="btn btn-outline btn-block" id="modalCancel">${t('إلغاء','Cancel')}</button>
      <button class="btn btn-primary btn-block" id="modalSubmit">${t('إنهاء التذكرة','Complete Ticket')}</button>
    </div>`
  );
}

function bindCompleteTicket(close){
  document.getElementById('modalCancel').onclick = close;
  document.getElementById('modalSubmit').onclick = async ()=>{
    const ticket = state.maintenance.find(m=>m.id===activeModal.ticketId);
    const fileInput = document.getElementById('ct_after');
    if(fileInput.files[0]) ticket.afterPhoto = await fileToDataUrl(fileInput.files[0]);
    ticket.status='completed';

    // if room was in maintenance status due to this ticket, restore to available (only if no other open tickets)
    const room = state.rooms[ticket.room];
    const otherOpen = state.maintenance.some(m=>m.room===ticket.room && m.id!==ticket.id && m.status!=='completed');
    if(room.status==='maintenance' && !otherOpen){
      room.status='available';
    }
    roomHistoryPush(ticket.room, {type:'maintenance', text:`تم إنهاء تذكرة الصيانة: ${ticket.problem}`, textEn:`Maintenance ticket completed: ${ticket.problem}`, icon:'✅'});
    logActivity(`${currentUser.name} أنهى تذكرة صيانة غرفة ${ticket.room}`, `${currentUser.nameEn} completed maintenance ticket for room ${ticket.room}`, '✅');
    saveState(); showToast(t('تم إنهاء التذكرة','Ticket completed')); close();
  };
}

    `,
    `<div class="modal-actions">
      <button class="btn btn-outline btn-block" id="modalCancel">${t('إلغاء','Cancel')}</button>
      <button class="btn btn-danger btn-block" id="modalSubmit">${t('تأكيد التقفيل','Confirm Settlement')}</button>
    </div>`
  );
}

function bindEndService(close){
  document.getElementById('modalCancel').onclick = close;
  document.getElementById('modalSubmit').onclick = ()=>{
    if(!confirm(t('هل أنت متأكد من تقفيل حساب هذا الموظف وإنهاء خدمته؟','Are you sure you want to settle this account and end this employee\u2019s service?'))) return;
    const emp = state.employees.find(e=>e.id===activeModal.empId);
    const amount = Number(document.getElementById('es_amount').value)||0;
    emp.active = false;
    emp.endOfService = {
      date: document.getElementById('es_date').value,
      settlementAmount: amount,
      note: document.getElementById('es_note').value.trim(),
    };
    logActivity(`${currentUser.name} قام بتقفيل حساب وإنهاء خدمة الموظف ${emp.name} بمبلغ ${amount.toLocaleString()}`, `${currentUser.nameEn} settled account and ended service for employee ${emp.name} with amount ${amount.toLocaleString()}`, '🔒');
    saveState(); showToast(t('تم تقفيل الحساب','Account settled')); close();
  };
}
